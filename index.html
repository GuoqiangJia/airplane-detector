<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飞机检测 Demo · YOLO26n</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: sans-serif;
      color: #fff;
    }

    #controls {
      width: 100%;
      max-width: 640px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #111;
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    .ctrl-label {
      color: #aaa;
      width: 80px;
      flex-shrink: 0;
    }

    .ctrl-value {
      color: #fff;
      width: 36px;
      text-align: right;
      flex-shrink: 0;
    }

    input[type=range] {
      flex: 1;
      height: 4px;
      accent-color: #e53e3e;
    }

    .model-btns {
      display: flex;
      gap: 8px;
      flex: 1;
    }

    .model-btn {
      flex: 1;
      padding: 6px 0;
      border-radius: 6px;
      border: 1px solid #444;
      background: #222;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .model-btn.active {
      background: #e53e3e;
      border-color: #e53e3e;
      color: #fff;
    }

    #status {
      padding: 8px 16px;
      font-size: 12px;
      color: #666;
      text-align: center;
      width: 100%;
      min-height: 30px;
    }

    #container {
      position: relative;
      width: 100%;
      max-width: 640px;
    }

    video {
      width: 100%;
      display: block;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #badge {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #e53e3e;
      color: #fff;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      display: none;
      z-index: 10;
      letter-spacing: 1px;
      box-shadow: 0 2px 12px rgba(229, 62, 62, 0.5);
    }

    #fps {
      position: fixed;
      bottom: 16px;
      right: 16px;
      font-size: 12px;
      color: #555;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      gap: 14px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #e53e3e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #loading-text {
      font-size: 14px;
      color: #aaa;
    }

    #progress-wrap {
      width: 260px;
      height: 4px;
      background: #333;
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: #e53e3e;
      transition: width 0.15s ease;
    }

    #progress-text {
      font-size: 11px;
      color: #555;
      display: none;
    }
  </style>
</head>

<body>

  <div id="loading">
    <div class="spinner"></div>
    <p id="loading-text">正在启动摄像头...</p>
    <div id="progress-wrap">
      <div id="progress-bar"></div>
    </div>
    <p id="progress-text"></p>
  </div>

  <div id="badge">✈ 检测到飞机！</div>

  <div id="controls">
    <div class="ctrl-row">
      <span class="ctrl-label">YOLO 模型</span>
      <div class="model-btns">
        <button class="model-btn active" id="btn-n" onclick="switchModel('yolo26n')">
          YOLO26n<br><span style="font-size:10px;color:#888">快 · 9.7MB</span>
        </button>
        <button class="model-btn" id="btn-s" onclick="switchModel('yolo26s')">
          YOLO26s<br><span style="font-size:10px;color:#888">准 · 38MB</span>
        </button>
      </div>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">置信度</span>
      <input type="range" id="threshold" min="5" max="80" value="35" step="5"
        oninput="document.getElementById('thresh-val').textContent=this.value+'%'">
      <span class="ctrl-value" id="thresh-val">35%</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">数字变焦</span>
      <input type="range" id="zoom" min="1" max="4" value="1" step="0.5"
        oninput="document.getElementById('zoom-val').textContent=this.value+'x'">
      <span class="ctrl-value" id="zoom-val">1x</span>
    </div>
  </div>

  <div id="status">等待模型加载...</div>

  <div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>
  <div id="fps"></div>

  <!--
=================================================================
  模型文件放置方式（二选一）：

  方式 A — 放到 repo（推荐，9.7MB 完全没问题）：
    项目根目录创建 models/ 文件夹，把 ONNX 放进去：
      models/yolo26n_640x640.onnx
      models/yolo26s_640x640.onnx （可选）
    下载地址：https://huggingface.co/AXERA-TECH/yolo26

  方式 B — 自己用 Python 导出 YOLO11n：
    pip install ultralytics
    python -c "from ultralytics import YOLO; YOLO('yolo11n.pt').export(format='onnx')"
    把生成的 yolo11n.onnx 放到 models/，
    并把下方 MODEL_FILES 里的路径改为 './models/yolo11n.onnx'

  两种模型输出格式完全相同（[1, 84, 8400]），代码无需修改。
=================================================================
-->

  <!-- ONNX Runtime Web（CDN UMD 版，全局变量 ort） -->
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>

  <script>
    // ── WASM 文件从 CDN 加载（不需要本地 .wasm）──────
    ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/';

    // ── 模型路径配置 ──────────────────────────────────
    const MODEL_FILES = {
      yolo26n: './models/yolo26n_640x640.onnx',
      yolo26s: './models/yolo26s_640x640.onnx',
    };

    // ── COCO 80 类名（airplane = index 4）────────────
    const COCO_CLASSES = [
      'person', 'bicycle', 'car', 'motorcycle', 'airplane', 'bus', 'train', 'truck', 'boat',
      'traffic light', 'fire hydrant', 'stop sign', 'parking meter', 'bench', 'bird', 'cat',
      'dog', 'horse', 'sheep', 'cow', 'elephant', 'bear', 'zebra', 'giraffe', 'backpack',
      'umbrella', 'handbag', 'tie', 'suitcase', 'frisbee', 'skis', 'snowboard', 'sports ball',
      'kite', 'baseball bat', 'baseball glove', 'skateboard', 'surfboard', 'tennis racket',
      'bottle', 'wine glass', 'cup', 'fork', 'knife', 'spoon', 'bowl', 'banana', 'apple',
      'sandwich', 'orange', 'broccoli', 'carrot', 'hot dog', 'pizza', 'donut', 'cake', 'chair',
      'couch', 'potted plant', 'bed', 'dining table', 'toilet', 'tv', 'laptop', 'mouse',
      'remote', 'keyboard', 'cell phone', 'microwave', 'oven', 'toaster', 'sink',
      'refrigerator', 'book', 'clock', 'vase', 'scissors', 'teddy bear', 'hair drier', 'toothbrush'
    ];
    const AIRPLANE_CLASS_ID = 4;

    // ── DOM ───────────────────────────────────────────
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const badge = document.getElementById('badge');
    const fpsEl = document.getElementById('fps');
    const loadingEl = document.getElementById('loading');
    const loadingTxt = document.getElementById('loading-text');
    const statusEl = document.getElementById('status');
    const threshEl = document.getElementById('threshold');
    const progressWrap = document.getElementById('progress-wrap');
    const progressBar = document.getElementById('progress-bar');
    const progressTxt = document.getElementById('progress-text');

    let session = null;
    let currentModel = 'yolo26n';
    let isLoading = false;
    let animFrame = null;
    let lastTime = 0, frameCount = 0, fps = 0;

    // 推理用离屏 Canvas（固定 640×640）
    const inferCanvas = document.createElement('canvas');
    inferCanvas.width = inferCanvas.height = 640;
    const inferCtx = inferCanvas.getContext('2d');

    function getThreshold() { return parseInt(threshEl.value) / 100; }

    // ── 切换模型 ──────────────────────────────────────
    window.switchModel = async function (key) {
      if (isLoading || key === currentModel) return;
      currentModel = key;
      document.getElementById('btn-n').classList.toggle('active', key === 'yolo26n');
      document.getElementById('btn-s').classList.toggle('active', key === 'yolo26s');
      if (animFrame) cancelAnimationFrame(animFrame);
      session = null;
      loadingEl.style.display = 'flex';
      loadingTxt.textContent = key === 'yolo26s' ? '加载 YOLO26s（38MB）...' : '加载 YOLO26n（9.7MB）...';
      await loadModel(key);
      loadingEl.style.display = 'none';
      detect();
    };

    // ── 加载 ONNX（带进度条）────────────────────────
    async function loadModel(key) {
      isLoading = true;
      progressWrap.style.display = 'block';
      progressTxt.style.display = 'block';
      progressBar.style.width = '0%';
      progressTxt.textContent = '正在下载...';

      const url = MODEL_FILES[key];

      try {
        // fetch + ReadableStream 读取进度
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(
          `找不到模型文件（HTTP ${resp.status}）\n请确认 ${url} 已放入 models/ 文件夹`
        );

        const total = parseInt(resp.headers.get('Content-Length') || '0');
        const reader = resp.body.getReader();
        const chunks = [];
        let loaded = 0;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          loaded += value.length;
          const pct = total > 0 ? Math.round(loaded / total * 100) : '?';
          progressBar.style.width = (total > 0 ? pct : 50) + '%';
          progressTxt.textContent =
            `下载中 ${pct}%（${(loaded / 1024 / 1024).toFixed(1)} MB${total ? ' / ' + (total / 1024 / 1024).toFixed(1) + ' MB' : ''}）`;
        }

        // 合并所有 chunks
        const buf = new Uint8Array(loaded);
        let offset = 0;
        for (const c of chunks) { buf.set(c, offset); offset += c.length; }

        progressBar.style.width = '100%';
        progressTxt.textContent = '初始化 ONNX Runtime...';

        // 创建推理 Session
        session = await ort.InferenceSession.create(buf.buffer, {
          executionProviders: ['wasm'],
          graphOptimizationLevel: 'all',
        });

        const outShape = Object.values(session.outputNames).join(', ');
        statusEl.textContent = `✅ ${key} 已加载 | 输入: images [1,3,640,640] | 输出: ${outShape}`;

      } catch (e) {
        statusEl.textContent = `❌ 加载失败：${e.message}`;
        console.error('[YOLO 加载失败]', e);
      }

      progressWrap.style.display = 'none';
      progressTxt.style.display = 'none';
      isLoading = false;
    }

    // ── 预处理：视频帧 → Tensor [1, 3, 640, 640] ────
    function preprocess() {
      inferCtx.drawImage(video, 0, 0, 640, 640);
      const px = inferCtx.getImageData(0, 0, 640, 640).data; // RGBA Uint8
      const N = 640 * 640;
      const buf = new Float32Array(3 * N);
      for (let i = 0; i < N; i++) {
        buf[i] = px[i * 4] / 255; // R
        buf[i + N] = px[i * 4 + 1] / 255; // G
        buf[i + N * 2] = px[i * 4 + 2] / 255; // B
      }
      return new ort.Tensor('float32', buf, [1, 3, 640, 640]);
    }

    // ── 后处理：解析 YOLO 输出 + NMS ─────────────────
    //
    // Ultralytics ONNX 标准输出 output0: [1, 84, 8400]
    //   行 0~3  : cx, cy, w, h（单位：640×640 像素）
    //   行 4~83 : 80 个 COCO 类别的置信度
    //   列      : 8400 个候选框（80²+40²+20²）
    //
    function postprocess(tensor, threshold) {
      const data = tensor.data;
      const dims = tensor.dims;  // [1, 84, 8400]

      let numBoxes, numAttrs;

      if (dims.length === 3 && dims[2] === 8400) {
        // 标准格式 [1, 84, 8400]
        numAttrs = dims[1];
        numBoxes = dims[2];
        return decodeStandard(data, numBoxes, numAttrs, threshold);
      } else if (dims.length === 3 && dims[1] === 8400) {
        // 转置格式 [1, 8400, 84]
        numBoxes = dims[1];
        numAttrs = dims[2];
        return decodeTransposed(data, numBoxes, numAttrs, threshold);
      } else {
        console.warn('未知输出维度:', dims, '请检查模型格式');
        return [];
      }
    }

    function decodeStandard(data, numBoxes, numAttrs, threshold) {
      const numClasses = numAttrs - 4;
      const dets = [];
      for (let i = 0; i < numBoxes; i++) {
        let maxScore = 0, maxCls = -1;
        for (let c = 0; c < numClasses; c++) {
          const s = data[(4 + c) * numBoxes + i];
          if (s > maxScore) { maxScore = s; maxCls = c; }
        }
        if (maxScore < threshold) continue;
        const cx = data[0 * numBoxes + i], cy = data[1 * numBoxes + i];
        const w = data[2 * numBoxes + i], h = data[3 * numBoxes + i];
        dets.push({ x1: cx - w / 2, y1: cy - h / 2, x2: cx + w / 2, y2: cy + h / 2, score: maxScore, classId: maxCls });
      }
      return nms(dets, 0.45);
    }

    function decodeTransposed(data, numBoxes, numAttrs, threshold) {
      const numClasses = numAttrs - 4;
      const dets = [];
      for (let i = 0; i < numBoxes; i++) {
        const base = i * numAttrs;
        let maxScore = 0, maxCls = -1;
        for (let c = 0; c < numClasses; c++) {
          const s = data[base + 4 + c];
          if (s > maxScore) { maxScore = s; maxCls = c; }
        }
        if (maxScore < threshold) continue;
        const cx = data[base], cy = data[base + 1], w = data[base + 2], h = data[base + 3];
        dets.push({ x1: cx - w / 2, y1: cy - h / 2, x2: cx + w / 2, y2: cy + h / 2, score: maxScore, classId: maxCls });
      }
      return nms(dets, 0.45);
    }

    // ── NMS ──────────────────────────────────────────
    function nms(dets, iouThresh) {
      dets.sort((a, b) => b.score - a.score);
      const keep = [];
      const done = new Uint8Array(dets.length);
      for (let i = 0; i < dets.length; i++) {
        if (done[i]) continue;
        keep.push(dets[i]);
        for (let j = i + 1; j < dets.length; j++) {
          if (!done[j] && iou(dets[i], dets[j]) > iouThresh) done[j] = 1;
        }
      }
      return keep;
    }

    function iou(a, b) {
      const ix1 = Math.max(a.x1, b.x1), iy1 = Math.max(a.y1, b.y1);
      const ix2 = Math.min(a.x2, b.x2), iy2 = Math.min(a.y2, b.y2);
      const inter = Math.max(0, ix2 - ix1) * Math.max(0, iy2 - iy1);
      return inter / ((a.x2 - a.x1) * (a.y2 - a.y1) + (b.x2 - b.x1) * (b.y2 - b.y1) - inter + 1e-6);
    }

    // ── 初始化 ────────────────────────────────────────
    async function init() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false,
        });
        video.srcObject = stream;
        await new Promise(r => video.onloadedmetadata = r);
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        loadingTxt.textContent = '加载 YOLO26n 模型（9.7MB）...';
      } catch (e) {
        loadingTxt.textContent = '无法访问摄像头：' + e.message;
        return;
      }
      await loadModel('yolo26n');
      loadingEl.style.display = 'none';
      detect();
    }

    // ── 检测主循环 ────────────────────────────────────
    async function detect() {
      if (!session || video.readyState < 2) {
        animFrame = requestAnimationFrame(detect);
        return;
      }

      const threshold = getThreshold();
      const zoom = parseFloat(document.getElementById('zoom').value);
      const cw = canvas.width, ch = canvas.height;
      const srcW = cw / zoom, srcH = ch / zoom;
      const srcX = (cw - srcW) / 2, srcY = (ch - srcH) / 2;

      // ① 推理
      let airplanes = [];
      try {
        const inputTensor = preprocess();
        const inputName = session.inputNames[0];   // 'images'
        const results = await session.run({ [inputName]: inputTensor });
        const outputTensor = results[session.outputNames[0]]; // 'output0'
        const allDets = postprocess(outputTensor, threshold);
        airplanes = allDets.filter(d => d.classId === AIRPLANE_CLASS_ID);

        // 若要显示所有类别而非仅飞机，把上面两行换成：
        // airplanes = allDets;

      } catch (e) {
        console.error('[推理错误]', e);
        animFrame = requestAnimationFrame(detect);
        return;
      }

      // ② 渲染帧（支持数字变焦）
      ctx.clearRect(0, 0, cw, ch);
      ctx.drawImage(video, srcX, srcY, srcW, srcH, 0, 0, cw, ch);

      // ③ 画检测框
      // YOLO 坐标在 640×640 空间，需缩放到 canvas 分辨率
      const sx = cw / 640, sy = ch / 640;

      airplanes.forEach(d => {
        let x = d.x1 * sx, y = d.y1 * sy;
        let w = (d.x2 - d.x1) * sx, h = (d.y2 - d.y1) * sy;

        // 变焦偏移
        x = (x - srcX) * zoom;
        y = (y - srcY) * zoom;
        w = w * zoom;
        h = h * zoom;

        // 红色边框
        ctx.strokeStyle = '#e53e3e';
        ctx.lineWidth = 3;
        ctx.strokeRect(x, y, w, h);

        // 标签
        const label = `✈ 飞机 ${Math.round(d.score * 100)}%`;
        ctx.font = 'bold 15px sans-serif';
        const tw = ctx.measureText(label).width;
        ctx.fillStyle = '#e53e3e';
        ctx.fillRect(x, y - 26, tw + 14, 26);
        ctx.fillStyle = '#fff';
        ctx.fillText(label, x + 7, y - 7);
      });

      badge.style.display = airplanes.length > 0 ? 'block' : 'none';

      // FPS
      frameCount++;
      const now = performance.now();
      if (now - lastTime >= 1000) {
        fps = frameCount; frameCount = 0; lastTime = now;
        fpsEl.textContent = `${fps} fps · YOLO26n ONNX`;
      }

      animFrame = requestAnimationFrame(detect);
    }

    init();
  </script>
</body>

</html>
