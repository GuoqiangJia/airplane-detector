<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>无人机检测 Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: sans-serif;
      color: #fff;
    }

    #controls {
      width: 100%;
      max-width: 640px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #111;
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    .ctrl-label {
      color: #aaa;
      width: 80px;
      flex-shrink: 0;
    }

    .ctrl-value {
      color: #fff;
      width: 40px;
      text-align: right;
      flex-shrink: 0;
    }

    input[type=range] {
      flex: 1;
      height: 4px;
      accent-color: #e53e3e;
    }

    .model-btns {
      display: flex;
      gap: 8px;
      flex: 1;
    }

    .model-btn {
      flex: 1;
      padding: 6px 0;
      border-radius: 6px;
      border: 1px solid #444;
      background: #222;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .model-btn.active {
      background: #e53e3e;
      border-color: #e53e3e;
      color: #fff;
    }

    .freq-btns {
      display: flex;
      gap: 6px;
      flex: 1;
    }

    .freq-btn {
      flex: 1;
      padding: 5px 0;
      border-radius: 6px;
      border: 1px solid #444;
      background: #222;
      color: #aaa;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .freq-btn.active {
      background: #e53e3e;
      border-color: #e53e3e;
      color: #fff;
    }

    #status {
      padding: 8px 16px;
      font-size: 11px;
      color: #555;
      text-align: center;
      width: 100%;
      min-height: 28px;
    }

    #container {
      position: relative;
      width: 100%;
      max-width: 640px;
    }

    video {
      width: 100%;
      display: block;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }



    #fps {
      position: fixed;
      bottom: 16px;
      right: 16px;
      font-size: 11px;
      color: #444;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      gap: 14px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #e53e3e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #loading-text {
      font-size: 14px;
      color: #aaa;
      text-align: center;
      padding: 0 20px;
    }

    #progress-wrap {
      width: 260px;
      height: 4px;
      background: #333;
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: #e53e3e;
      transition: width 0.15s ease;
    }

    #progress-text {
      font-size: 11px;
      color: #555;
      display: none;
    }
  </style>
</head>

<body>

  <div id="loading">
    <div class="spinner"></div>
    <p id="loading-text">正在启动摄像头...</p>
    <div id="progress-wrap">
      <div id="progress-bar"></div>
    </div>
    <p id="progress-text"></p>
  </div>



  <div id="controls">
    <div class="ctrl-row">
      <span class="ctrl-label">检测模型</span>
      <div class="model-btns">
        <button class="model-btn active" id="btn-fast" onclick="switchModel('fast')">
          快速版<br><span style="font-size:10px;color:#888">流畅 · 10MB</span>
        </button>
        <button class="model-btn" id="btn-accurate" onclick="switchModel('accurate')">
          精准版<br><span style="font-size:10px;color:#888">准确 · 95MB</span>
        </button>
      </div>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">检测频率</span>
      <div class="freq-btns">
        <button class="freq-btn" onclick="setFreq(200, this)">5次/秒</button>
        <button class="freq-btn active" onclick="setFreq(500, this)">2次/秒</button>
        <button class="freq-btn" onclick="setFreq(1000, this)">1次/秒</button>
        <button class="freq-btn" onclick="setFreq(2000, this)">省流量</button>
      </div>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">灵敏度</span>
      <input type="range" id="threshold" min="5" max="80" value="25" step="5"
        oninput="document.getElementById('thresh-val').textContent=this.value+'%'">
      <span class="ctrl-value" id="thresh-val">25%</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">数字变焦</span>
      <input type="range" id="zoom" min="1" max="4" value="1" step="0.5"
        oninput="document.getElementById('zoom-val').textContent=this.value+'x'">
      <span class="ctrl-value" id="zoom-val">1x</span>
    </div>
  </div>

  <div id="status">等待加载...</div>

  <div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>
  <div id="fps"></div>

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>
  <script>
    ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/';

    // ── 模型配置 ──────────────────────────────────────
    const MODELS = {
      fast: { path: './models/yolo26n_drone_v1.onnx', label: '快速版', size: '10MB' },
      accurate: { path: './models/yolo26l_drone_v1.onnx', label: '精准版', size: '95MB' },
    };
    const DRONE_CLASS_ID = 0;
    let DETECT_INTERVAL = 500;
    let currentModelKey = 'fast';
    let outputFormat = 'unknown'; // 自动检测输出格式

    // ── DOM ───────────────────────────────────────────
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const fpsEl = document.getElementById('fps');
    const loadingEl = document.getElementById('loading');
    const loadingTxt = document.getElementById('loading-text');
    const statusEl = document.getElementById('status');
    const threshEl = document.getElementById('threshold');
    const progressWrap = document.getElementById('progress-wrap');
    const progressBar = document.getElementById('progress-bar');
    const progressTxt = document.getElementById('progress-text');

    let session = null;
    let animFrame = null;
    let lastDetections = [];
    let requesting = false;
    let lastSendTime = 0;
    let lastTime = 0, frameCount = 0;

    const inferCanvas = document.createElement('canvas');
    inferCanvas.width = inferCanvas.height = 640;
    const inferCtx = inferCanvas.getContext('2d');

    function getThreshold() { return parseInt(threshEl.value) / 100; }

    window.setFreq = function (ms, btn) {
      DETECT_INTERVAL = ms;
      document.querySelectorAll('.freq-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };

    window.switchModel = async function (key) {
      if (key === currentModelKey) return;
      currentModelKey = key;
      document.getElementById('btn-fast').classList.toggle('active', key === 'fast');
      document.getElementById('btn-accurate').classList.toggle('active', key === 'accurate');
      if (animFrame) cancelAnimationFrame(animFrame);
      session = null;
      lastDetections = [];
      loadingEl.style.display = 'flex';
      loadingTxt.textContent = `切换到${MODELS[key].label}...`;
      await loadModel(key);
      loadingEl.style.display = 'none';
      detect();
    };

    // ── 加载模型 ──────────────────────────────────────
    async function loadModel(key) {
      const m = MODELS[key];
      progressWrap.style.display = 'block';
      progressTxt.style.display = 'block';
      progressBar.style.width = '0%';
      progressTxt.textContent = '准备下载...';

      try {
        const resp = await fetch(m.path);
        if (!resp.ok) throw new Error(`找不到模型文件（HTTP ${resp.status}）`);

        const total = parseInt(resp.headers.get('Content-Length') || '0');
        const reader = resp.body.getReader();
        const chunks = [];
        let loaded = 0;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          loaded += value.length;
          const pct = total > 0 ? Math.round(loaded / total * 100) : 50;
          progressBar.style.width = pct + '%';
          progressTxt.textContent =
            `下载中 ${pct}%（${(loaded / 1024 / 1024).toFixed(1)}MB${total ? ' / ' + (total / 1024 / 1024).toFixed(1) + 'MB' : ''}）`;
        }

        const buf = new Uint8Array(loaded);
        let offset = 0;
        for (const c of chunks) { buf.set(c, offset); offset += c.length; }

        progressBar.style.width = '100%';
        progressTxt.textContent = '初始化检测引擎...';

        session = await ort.InferenceSession.create(buf.buffer, {
          executionProviders: ['wasm'],
          graphOptimizationLevel: 'all',
        });

        // 自动检测输出格式
        const outName = session.outputNames[0];
        console.log('输入:', session.inputNames);
        console.log('输出:', session.outputNames);

        // 用空白图推理一次检测输出维度
        const dummy = new ort.Tensor('float32', new Float32Array(1 * 3 * 640 * 640), [1, 3, 640, 640]);
        const testOut = await session.run({ [session.inputNames[0]]: dummy });
        const testTensor = testOut[session.outputNames[0]];
        const dims = testTensor.dims;
        console.log('输出维度:', dims);

        // 自动判断格式
        if (dims.length === 3 && dims[1] === 300 && dims[2] === 6) {
          outputFormat = 'nms_free'; // [1, 300, 6] NMS-free格式
        } else if (dims.length === 3 && dims[2] === 8400) {
          outputFormat = 'standard'; // [1, 84, 8400] 标准格式
        } else if (dims.length === 3 && dims[1] === 8400) {
          outputFormat = 'transposed'; // [1, 8400, 84] 转置格式
        } else {
          outputFormat = 'unknown';
        }

        statusEl.textContent = `✅ ${m.label}已就绪（${m.size}）· 专项无人机检测模型`;

      } catch (e) {
        statusEl.textContent = `❌ 加载失败：${e.message}`;
        console.error(e);
      }

      progressWrap.style.display = 'none';
      progressTxt.style.display = 'none';
    }

    // ── 预处理 ────────────────────────────────────────
    function preprocess() {
      inferCtx.drawImage(video, 0, 0, 640, 640);
      const px = inferCtx.getImageData(0, 0, 640, 640).data;
      const N = 640 * 640;
      const buf = new Float32Array(3 * N);
      for (let i = 0; i < N; i++) {
        buf[i] = px[i * 4] / 255;
        buf[i + N] = px[i * 4 + 1] / 255;
        buf[i + N * 2] = px[i * 4 + 2] / 255;
      }
      return new ort.Tensor('float32', buf, [1, 3, 640, 640]);
    }

    // ── 后处理：自动兼容三种输出格式 ─────────────────
    function postprocess(tensor, threshold) {
      const data = tensor.data;
      const dims = tensor.dims;

      // 格式1：[1, 300, 6] NMS-free（YOLO26 end-to-end）
      // 每行：x1, y1, x2, y2, score, class_id
      if (dims.length === 3 && dims[1] <= 300 && dims[2] === 6) {
        const numBoxes = dims[1];
        const dets = [];
        for (let i = 0; i < numBoxes; i++) {
          const base = i * 6;
          const score = data[base + 4];
          const cls = Math.round(data[base + 5]);
          if (score < threshold) continue;
          dets.push({
            x1: data[base], y1: data[base + 1],
            x2: data[base + 2], y2: data[base + 3],
            score, classId: cls,
          });
        }
        return dets; // NMS-free 不需要再做 NMS

        // 格式2：[1, 84, 8400] 标准格式
      } else if (dims.length === 3 && dims[2] === 8400) {
        return decodeStd(data, dims[1], dims[2], threshold);

        // 格式3：[1, 8400, 84] 转置格式
      } else if (dims.length === 3 && dims[1] === 8400) {
        return decodeTrp(data, dims[1], dims[2], threshold);

      } else {
        console.warn('未知输出维度:', dims);
        return [];
      }
    }

    function decodeStd(data, numAttrs, numBoxes, thr) {
      const nc = numAttrs - 4;
      const dets = [];
      for (let i = 0; i < numBoxes; i++) {
        let ms = 0, mc = -1;
        for (let c = 0; c < nc; c++) {
          const s = data[(4 + c) * numBoxes + i];
          if (s > ms) { ms = s; mc = c; }
        }
        if (ms < thr) continue;
        const cx = data[0 * numBoxes + i], cy = data[1 * numBoxes + i];
        const w = data[2 * numBoxes + i], h = data[3 * numBoxes + i];
        dets.push({ x1: cx - w / 2, y1: cy - h / 2, x2: cx + w / 2, y2: cy + h / 2, score: ms, classId: mc });
      }
      return nms(dets, 0.45);
    }

    function decodeTrp(data, numBoxes, numAttrs, thr) {
      const nc = numAttrs - 4;
      const dets = [];
      for (let i = 0; i < numBoxes; i++) {
        const base = i * numAttrs;
        let ms = 0, mc = -1;
        for (let c = 0; c < nc; c++) {
          const s = data[base + 4 + c];
          if (s > ms) { ms = s; mc = c; }
        }
        if (ms < thr) continue;
        const cx = data[base], cy = data[base + 1], w = data[base + 2], h = data[base + 3];
        dets.push({ x1: cx - w / 2, y1: cy - h / 2, x2: cx + w / 2, y2: cy + h / 2, score: ms, classId: mc });
      }
      return nms(dets, 0.45);
    }

    function nms(dets, iouThr) {
      dets.sort((a, b) => b.score - a.score);
      const keep = [], done = new Uint8Array(dets.length);
      for (let i = 0; i < dets.length; i++) {
        if (done[i]) continue;
        keep.push(dets[i]);
        for (let j = i + 1; j < dets.length; j++) {
          if (!done[j] && iou(dets[i], dets[j]) > iouThr) done[j] = 1;
        }
      }
      return keep;
    }

    function iou(a, b) {
      const ix1 = Math.max(a.x1, b.x1), iy1 = Math.max(a.y1, b.y1);
      const ix2 = Math.min(a.x2, b.x2), iy2 = Math.min(a.y2, b.y2);
      const inter = Math.max(0, ix2 - ix1) * Math.max(0, iy2 - iy1);
      return inter / ((a.x2 - a.x1) * (a.y2 - a.y1) + (b.x2 - b.x1) * (b.y2 - b.y1) - inter + 1e-6);
    }

    // ── 异步推理 ──────────────────────────────────────
    async function sendFrame() {
      if (!session || video.readyState < 2) { requesting = false; return; }
      try {
        const inputTensor = preprocess();
        const results = await session.run({ [session.inputNames[0]]: inputTensor });
        const outputTensor = results[session.outputNames[0]];
        const allDets = postprocess(outputTensor, getThreshold());
        lastDetections = allDets.filter(d => d.classId === DRONE_CLASS_ID);
      } catch (e) {
        console.error('[推理错误]', e);
      }
      requesting = false;
    }

    // ── 画框 ──────────────────────────────────────────
    function drawBoxes(dets) {
      const cw = canvas.width, ch = canvas.height;
      const zoom = parseFloat(document.getElementById('zoom').value);
      const srcW = cw / zoom, srcH = ch / zoom;
      const srcX = (cw - srcW) / 2, srcY = (ch - srcH) / 2;
      const sx = cw / 640, sy = ch / 640;

      dets.forEach(d => {
        let x = d.x1 * sx, y = d.y1 * sy;
        let w = (d.x2 - d.x1) * sx, h = (d.y2 - d.y1) * sy;
        x = (x - srcX) * zoom; y = (y - srcY) * zoom;
        w = w * zoom; h = h * zoom;

        ctx.strokeStyle = '#e53e3e';
        ctx.lineWidth = 3;
        ctx.strokeRect(x, y, w, h);

        const c = 14;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        [[x, y], [x + w, y], [x, y + h], [x + w, y + h]].forEach(([cx, cy]) => {
          const dx = cx === x ? 1 : -1, dy = cy === y ? 1 : -1;
          ctx.beginPath();
          ctx.moveTo(cx + dx * c, cy); ctx.lineTo(cx, cy); ctx.lineTo(cx, cy + dy * c);
          ctx.stroke();
        });

        const label = `🚁 无人机 ${Math.round(d.score * 100)}%`;
        ctx.font = 'bold 14px sans-serif';
        const tw = ctx.measureText(label).width;
        ctx.fillStyle = '#e53e3e';
        ctx.fillRect(x, y - 26, tw + 14, 26);
        ctx.fillStyle = '#fff';
        ctx.fillText(label, x + 7, y - 7);
      });
    }

    // ── 初始化 ────────────────────────────────────────
    async function init() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false,
        });
        video.srcObject = stream;
        await new Promise(r => video.onloadedmetadata = r);
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        loadingTxt.textContent = '加载快速检测模型（10MB）...';
      } catch (e) {
        loadingTxt.textContent = '无法访问摄像头：' + e.message;
        return;
      }
      await loadModel('fast');
      loadingEl.style.display = 'none';
      detect();
    }

    // ── 主循环 ────────────────────────────────────────
    function detect() {
      const cw = canvas.width, ch = canvas.height;
      const zoom = parseFloat(document.getElementById('zoom').value);
      const srcW = cw / zoom, srcH = ch / zoom;
      const srcX = (cw - srcW) / 2, srcY = (ch - srcH) / 2;

      ctx.clearRect(0, 0, cw, ch);
      ctx.drawImage(video, srcX, srcY, srcW, srcH, 0, 0, cw, ch);
      drawBoxes(lastDetections);


      const now = Date.now();
      if (!requesting && session && now - lastSendTime > DETECT_INTERVAL) {
        lastSendTime = now;
        requesting = true;
        sendFrame();
      }

      frameCount++;
      if (now - lastTime >= 1000) {
        const fps = frameCount; frameCount = 0; lastTime = now;
        fpsEl.textContent = `渲染 ${fps}fps · 检测 ${(1000 / DETECT_INTERVAL).toFixed(1)}次/秒`;
      }

      animFrame = requestAnimationFrame(detect);
    }

    init();
  </script>
</body>

</html>
