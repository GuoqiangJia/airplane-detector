<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞机检测 Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; flex-direction: column; align-items: center; min-height: 100vh; font-family: sans-serif; color: #fff; }
  #status { padding: 14px 20px; font-size: 15px; color: #aaa; text-align: center; width: 100%; }
  #container { position: relative; width: 100%; max-width: 640px; }
  video { width: 100%; display: block; }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  #badge {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: #e53e3e; color: #fff; padding: 8px 20px;
    border-radius: 20px; font-size: 14px; font-weight: bold;
    display: none; z-index: 10; letter-spacing: 1px;
    box-shadow: 0 2px 12px rgba(229,62,62,0.5);
  }
  #fps { position: fixed; bottom: 16px; right: 16px; font-size: 12px; color: #555; }
</style>
</head>
<body>

<div id="status">正在加载检测模型，请稍候...</div>
<div id="badge">✈ 检测到飞机！</div>
<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
</div>
<div id="fps"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script>
const video   = document.getElementById('video');
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const status  = document.getElementById('status');
const badge   = document.getElementById('badge');
const fpsEl   = document.getElementById('fps');

let model, lastTime = 0, frameCount = 0, fps = 0;

async function init() {
  // 1. 启动摄像头
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    status.textContent = '摄像头已开启，正在加载 AI 模型...';
  } catch (e) {
    status.textContent = '无法访问摄像头：' + e.message;
    return;
  }

  // 2. 加载 COCO-SSD 模型
  try {
    model = await cocoSsd.load({ base: 'mobilenet_v2' });
    status.textContent = '模型加载完成，开始检测...';
    setTimeout(() => status.style.display = 'none', 1500);
    detect();
  } catch (e) {
    status.textContent = '模型加载失败：' + e.message;
  }
}

async function detect() {
  if (!model || video.readyState < 2) { requestAnimationFrame(detect); return; }

  const predictions = await model.detect(video);

  // 清空画布
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const airplanes = predictions.filter(p =>
    p.class === 'airplane' && p.score > 0.4
  );

  // 画红框
  airplanes.forEach(p => {
    const [x, y, w, h] = p.bbox;
    ctx.strokeStyle = '#e53e3e';
    ctx.lineWidth   = 3;
    ctx.strokeRect(x, y, w, h);

    // 标签背景
    const label = `飞机 ${Math.round(p.score * 100)}%`;
    ctx.font = 'bold 16px sans-serif';
    const tw = ctx.measureText(label).width;
    ctx.fillStyle = '#e53e3e';
    ctx.fillRect(x, y - 26, tw + 14, 26);
    ctx.fillStyle = '#fff';
    ctx.fillText(label, x + 7, y - 7);
  });

  // 顶部提示条
  if (airplanes.length > 0) {
    badge.style.display = 'block';
  } else {
    badge.style.display = 'none';
  }

  // FPS 计算
  frameCount++;
  const now = performance.now();
  if (now - lastTime >= 1000) {
    fps = frameCount;
    frameCount = 0;
    lastTime = now;
    fpsEl.textContent = fps + ' fps';
  }

  requestAnimationFrame(detect);
}

init();
</script>
</body>
</html>
