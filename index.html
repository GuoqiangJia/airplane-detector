<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>无人机检测 Demo · YOLO26l</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: sans-serif;
      color: #fff;
    }

    #controls {
      width: 100%;
      max-width: 640px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #111;
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    .ctrl-label {
      color: #aaa;
      width: 80px;
      flex-shrink: 0;
    }

    .ctrl-value {
      color: #fff;
      width: 40px;
      text-align: right;
      flex-shrink: 0;
    }

    input[type=range] {
      flex: 1;
      height: 4px;
      accent-color: #e53e3e;
    }

    .freq-btns {
      display: flex;
      gap: 6px;
      flex: 1;
    }

    .freq-btn {
      flex: 1;
      padding: 5px 0;
      border-radius: 6px;
      border: 1px solid #444;
      background: #222;
      color: #aaa;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .freq-btn.active {
      background: #e53e3e;
      border-color: #e53e3e;
      color: #fff;
    }

    #status {
      padding: 8px 16px;
      font-size: 11px;
      color: #555;
      text-align: center;
      width: 100%;
      min-height: 28px;
    }

    #container {
      position: relative;
      width: 100%;
      max-width: 640px;
    }

    video {
      width: 100%;
      display: block;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #badge {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #e53e3e;
      color: #fff;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      display: none;
      z-index: 10;
      letter-spacing: 1px;
      box-shadow: 0 2px 12px rgba(229, 62, 62, 0.5);
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 2px 12px rgba(229, 62, 62, 0.5);
      }

      50% {
        box-shadow: 0 2px 24px rgba(229, 62, 62, 0.9);
      }
    }

    #fps {
      position: fixed;
      bottom: 16px;
      right: 16px;
      font-size: 11px;
      color: #444;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      gap: 14px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #e53e3e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #loading-text {
      font-size: 14px;
      color: #aaa;
    }

    #progress-wrap {
      width: 260px;
      height: 4px;
      background: #333;
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: #e53e3e;
      transition: width 0.15s ease;
    }

    #progress-text {
      font-size: 11px;
      color: #555;
      display: none;
    }
  </style>
</head>

<body>

  <div id="loading">
    <div class="spinner"></div>
    <p id="loading-text">正在启动摄像头...</p>
    <div id="progress-wrap">
      <div id="progress-bar"></div>
    </div>
    <p id="progress-text"></p>
  </div>

  <div id="badge">🚁 检测到无人机！</div>

  <div id="controls">
    <div class="ctrl-row">
      <span class="ctrl-label">检测频率</span>
      <div class="freq-btns">
        <button class="freq-btn" onclick="setFreq(200)">5fps<br><span
            style="font-size:9px;color:#888">高频</span></button>
        <button class="freq-btn active" id="freq-default" onclick="setFreq(500)">2fps<br><span
            style="font-size:9px;color:#888">推荐</span></button>
        <button class="freq-btn" onclick="setFreq(1000)">1fps<br><span
            style="font-size:9px;color:#888">省电</span></button>
        <button class="freq-btn" onclick="setFreq(2000)">0.5fps<br><span
            style="font-size:9px;color:#888">省流</span></button>
      </div>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">置信度</span>
      <input type="range" id="threshold" min="5" max="80" value="35" step="5"
        oninput="document.getElementById('thresh-val').textContent=this.value+'%'">
      <span class="ctrl-value" id="thresh-val">35%</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">数字变焦</span>
      <input type="range" id="zoom" min="1" max="4" value="1" step="0.5"
        oninput="document.getElementById('zoom-val').textContent=this.value+'x'">
      <span class="ctrl-value" id="zoom-val">1x</span>
    </div>
  </div>

  <div id="status">等待模型加载...</div>

  <div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>
  <div id="fps"></div>

  <!--
  模型文件：models/yolo26l_drone_v1.onnx（94.8MB）
  训练数据：Drone-detectionn 24k张，mAP50=97.1%
  模型类别：只有1类 → drone（index=0）
-->
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>
  <script>
    ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/';

    // ── 配置 ──────────────────────────────────────────
    const MODEL_PATH = './models/yolo26l_drone_v1.onnx';
    const DRONE_CLASS_ID = 0;       // 训练数据只有1类，index=0
    let DETECT_INTERVAL = 500;      // 默认每500ms推理一次

    // ── DOM ───────────────────────────────────────────
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const badge = document.getElementById('badge');
    const fpsEl = document.getElementById('fps');
    const loadingEl = document.getElementById('loading');
    const loadingTxt = document.getElementById('loading-text');
    const statusEl = document.getElementById('status');
    const threshEl = document.getElementById('threshold');
    const progressWrap = document.getElementById('progress-wrap');
    const progressBar = document.getElementById('progress-bar');
    const progressTxt = document.getElementById('progress-text');

    let session = null;
    let animFrame = null;
    let lastDetections = [];   // 缓存上次检测结果
    let requesting = false;// 防止请求堆积
    let lastSendTime = 0;
    let lastTime = 0, frameCount = 0, fps = 0;

    // 推理用离屏 Canvas（固定640×640）
    const inferCanvas = document.createElement('canvas');
    inferCanvas.width = inferCanvas.height = 640;
    const inferCtx = inferCanvas.getContext('2d');

    function getThreshold() { return parseInt(threshEl.value) / 100; }

    // ── 切换检测频率 ──────────────────────────────────
    window.setFreq = function (ms) {
      DETECT_INTERVAL = ms;
      document.querySelectorAll('.freq-btn').forEach(b => b.classList.remove('active'));
      event.target.closest('.freq-btn').classList.add('active');
    };

    // ── 加载模型（带进度）────────────────────────────
    async function loadModel() {
      progressWrap.style.display = 'block';
      progressTxt.style.display = 'block';
      progressBar.style.width = '0%';
      progressTxt.textContent = '下载中...';

      try {
        const resp = await fetch(MODEL_PATH);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}，找不到 ${MODEL_PATH}`);

        const total = parseInt(resp.headers.get('Content-Length') || '0');
        const reader = resp.body.getReader();
        const chunks = [];
        let loaded = 0;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          loaded += value.length;
          const pct = total > 0 ? Math.round(loaded / total * 100) : 50;
          progressBar.style.width = pct + '%';
          progressTxt.textContent =
            `下载中 ${pct}%（${(loaded / 1024 / 1024).toFixed(1)}MB${total ? ' / ' + (total / 1024 / 1024).toFixed(1) + 'MB' : ''}）`;
        }

        const buf = new Uint8Array(loaded);
        let offset = 0;
        for (const c of chunks) { buf.set(c, offset); offset += c.length; }

        progressBar.style.width = '100%';
        progressTxt.textContent = '初始化 ONNX Runtime...';

        // 优先使用 WebGPU（GPU加速），降级到 WASM（CPU）
        session = await ort.InferenceSession.create(buf.buffer, {
          executionProviders: ['webgpu', 'wasm'],
          graphOptimizationLevel: 'all',
        });

        const provider = session.handler?._ep || 'wasm';
        statusEl.textContent = `✅ YOLO26l 已加载（mAP50=97%）· ${MODEL_PATH.split('/').pop()}`;

      } catch (e) {
        statusEl.textContent = `❌ 加载失败：${e.message}`;
        console.error(e);
      }

      progressWrap.style.display = 'none';
      progressTxt.style.display = 'none';
    }

    // ── 预处理：视频帧 → Tensor [1,3,640,640] ────────
    function preprocess() {
      inferCtx.drawImage(video, 0, 0, 640, 640);
      const px = inferCtx.getImageData(0, 0, 640, 640).data;
      const N = 640 * 640;
      const buf = new Float32Array(3 * N);
      for (let i = 0; i < N; i++) {
        buf[i] = px[i * 4] / 255;
        buf[i + N] = px[i * 4 + 1] / 255;
        buf[i + N * 2] = px[i * 4 + 2] / 255;
      }
      return new ort.Tensor('float32', buf, [1, 3, 640, 640]);
    }

    // ── 后处理：解析 YOLO 输出 + NMS ─────────────────
    // 标准 Ultralytics ONNX 输出：[1, 84, 8400]
    // 行0~3: cx,cy,w,h；行4~83: 80类分数（我们只有1类）
    function postprocess(tensor, threshold) {
      const data = tensor.data;
      const dims = tensor.dims;

      if (dims.length === 3 && dims[2] === 8400) {
        return decodeStandard(data, dims[1], dims[2], threshold);
      } else if (dims.length === 3 && dims[1] === 8400) {
        return decodeTransposed(data, dims[1], dims[2], threshold);
      } else {
        console.warn('未知输出维度:', dims);
        return [];
      }
    }

    function decodeStandard(data, numAttrs, numBoxes, threshold) {
      const numClasses = numAttrs - 4;
      const dets = [];
      for (let i = 0; i < numBoxes; i++) {
        let maxScore = 0, maxCls = -1;
        for (let c = 0; c < numClasses; c++) {
          const s = data[(4 + c) * numBoxes + i];
          if (s > maxScore) { maxScore = s; maxCls = c; }
        }
        if (maxScore < threshold) continue;
        const cx = data[0 * numBoxes + i], cy = data[1 * numBoxes + i];
        const w = data[2 * numBoxes + i], h = data[3 * numBoxes + i];
        dets.push({ x1: cx - w / 2, y1: cy - h / 2, x2: cx + w / 2, y2: cy + h / 2, score: maxScore, classId: maxCls });
      }
      return nms(dets, 0.45);
    }

    function decodeTransposed(data, numBoxes, numAttrs, threshold) {
      const numClasses = numAttrs - 4;
      const dets = [];
      for (let i = 0; i < numBoxes; i++) {
        const base = i * numAttrs;
        let maxScore = 0, maxCls = -1;
        for (let c = 0; c < numClasses; c++) {
          const s = data[base + 4 + c];
          if (s > maxScore) { maxScore = s; maxCls = c; }
        }
        if (maxScore < threshold) continue;
        const cx = data[base], cy = data[base + 1], w = data[base + 2], h = data[base + 3];
        dets.push({ x1: cx - w / 2, y1: cy - h / 2, x2: cx + w / 2, y2: cy + h / 2, score: maxScore, classId: maxCls });
      }
      return nms(dets, 0.45);
    }

    function nms(dets, iouThresh) {
      dets.sort((a, b) => b.score - a.score);
      const keep = [], done = new Uint8Array(dets.length);
      for (let i = 0; i < dets.length; i++) {
        if (done[i]) continue;
        keep.push(dets[i]);
        for (let j = i + 1; j < dets.length; j++) {
          if (!done[j] && iou(dets[i], dets[j]) > iouThresh) done[j] = 1;
        }
      }
      return keep;
    }

    function iou(a, b) {
      const ix1 = Math.max(a.x1, b.x1), iy1 = Math.max(a.y1, b.y1);
      const ix2 = Math.min(a.x2, b.x2), iy2 = Math.min(a.y2, b.y2);
      const inter = Math.max(0, ix2 - ix1) * Math.max(0, iy2 - iy1);
      return inter / ((a.x2 - a.x1) * (a.y2 - a.y1) + (b.x2 - b.x1) * (b.y2 - b.y1) - inter + 1e-6);
    }

    // ── 异步推理（不阻塞画面渲染）────────────────────
    async function sendFrame() {
      if (!session || video.readyState < 2) return;
      try {
        const inputTensor = preprocess();
        const inputName = session.inputNames[0];
        const results = await session.run({ [inputName]: inputTensor });
        const outputTensor = results[session.outputNames[0]];
        const allDets = postprocess(outputTensor, getThreshold());
        // 只保留无人机（class 0）
        lastDetections = allDets.filter(d => d.classId === DRONE_CLASS_ID);
      } catch (e) {
        console.error('[推理错误]', e);
      }
      requesting = false;
    }

    // ── 画检测框 ──────────────────────────────────────
    function drawBoxes(detections) {
      const cw = canvas.width, ch = canvas.height;
      const zoom = parseFloat(document.getElementById('zoom').value);
      const srcW = cw / zoom, srcH = ch / zoom;
      const srcX = (cw - srcW) / 2, srcY = (ch - srcH) / 2;
      const sx = cw / 640, sy = ch / 640;

      detections.forEach(d => {
        let x = d.x1 * sx, y = d.y1 * sy;
        let w = (d.x2 - d.x1) * sx, h = (d.y2 - d.y1) * sy;
        x = (x - srcX) * zoom;
        y = (y - srcY) * zoom;
        w = w * zoom; h = h * zoom;

        // 红色边框
        ctx.strokeStyle = '#e53e3e';
        ctx.lineWidth = 3;
        ctx.strokeRect(x, y, w, h);

        // 角标装饰
        const corner = 12;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        [[x, y], [x + w, y], [x, y + h], [x + w, y + h]].forEach(([cx, cy]) => {
          const dx = cx === x ? 1 : -1;
          const dy = cy === y ? 1 : -1;
          ctx.beginPath();
          ctx.moveTo(cx + dx * corner, cy);
          ctx.lineTo(cx, cy);
          ctx.lineTo(cx, cy + dy * corner);
          ctx.stroke();
        });

        // 标签
        const label = `🚁 无人机 ${Math.round(d.score * 100)}%`;
        ctx.font = 'bold 14px sans-serif';
        const tw = ctx.measureText(label).width;
        ctx.fillStyle = '#e53e3e';
        ctx.fillRect(x, y - 26, tw + 14, 26);
        ctx.fillStyle = '#fff';
        ctx.fillText(label, x + 7, y - 7);
      });
    }

    // ── 初始化 ────────────────────────────────────────
    async function init() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false,
        });
        video.srcObject = stream;
        await new Promise(r => video.onloadedmetadata = r);
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        loadingTxt.textContent = '加载 YOLO26l 无人机模型（94.8MB）...';
      } catch (e) {
        loadingTxt.textContent = '无法访问摄像头：' + e.message;
        return;
      }

      await loadModel();
      loadingEl.style.display = 'none';
      detect();
    }

    // ── 检测主循环（异步，画面始终流畅）─────────────
    async function detect() {
      const cw = canvas.width, ch = canvas.height;
      const zoom = parseFloat(document.getElementById('zoom').value);
      const srcW = cw / zoom, srcH = ch / zoom;
      const srcX = (cw - srcW) / 2, srcY = (ch - srcH) / 2;

      // 始终渲染最新画面（60fps 流畅）
      ctx.clearRect(0, 0, cw, ch);
      ctx.drawImage(video, srcX, srcY, srcW, srcH, 0, 0, cw, ch);

      // 用上次缓存的检测结果画框
      drawBoxes(lastDetections);
      badge.style.display = lastDetections.length > 0 ? 'block' : 'none';

      // 按设定频率异步发送推理请求
      const now = Date.now();
      if (!requesting && session && now - lastSendTime > DETECT_INTERVAL) {
        lastSendTime = now;
        requesting = true;
        sendFrame();  // 异步，不等待
      }

      // FPS
      frameCount++;
      if (now - lastTime >= 1000) {
        fps = frameCount; frameCount = 0; lastTime = now;
        const inferHz = (1000 / DETECT_INTERVAL).toFixed(1);
        fpsEl.textContent = `渲染 ${fps}fps · 推理 ${inferHz}fps · YOLO26l`;
      }

      animFrame = requestAnimationFrame(detect);
    }

    init();
  </script>
</body>

</html>
