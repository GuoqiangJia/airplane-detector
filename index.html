<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞机检测 Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; flex-direction: column; align-items: center; min-height: 100vh; font-family: sans-serif; color: #fff; }

  #controls {
    width: 100%; max-width: 640px;
    padding: 12px 16px;
    display: flex; flex-direction: column; gap: 10px;
    background: #111;
  }

  .ctrl-row {
    display: flex; align-items: center; gap: 10px; font-size: 13px;
  }
  .ctrl-label { color: #aaa; width: 80px; flex-shrink: 0; }
  .ctrl-value { color: #fff; width: 36px; text-align: right; flex-shrink: 0; }

  input[type=range] {
    flex: 1; height: 4px; accent-color: #e53e3e;
  }

  .model-btns { display: flex; gap: 8px; flex: 1; }
  .model-btn {
    flex: 1; padding: 6px 0; border-radius: 6px; border: 1px solid #444;
    background: #222; color: #aaa; font-size: 12px; cursor: pointer;
    transition: all 0.2s;
  }
  .model-btn.active { background: #e53e3e; border-color: #e53e3e; color: #fff; }

  #status { padding: 10px 16px; font-size: 13px; color: #aaa; text-align: center; width: 100%; }

  #container { position: relative; width: 100%; max-width: 640px; }
  video { width: 100%; display: block; }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  #badge {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: #e53e3e; color: #fff; padding: 8px 20px;
    border-radius: 20px; font-size: 14px; font-weight: bold;
    display: none; z-index: 10; letter-spacing: 1px;
    box-shadow: 0 2px 12px rgba(229,62,62,0.5);
  }
  #fps { position: fixed; bottom: 16px; right: 16px; font-size: 12px; color: #555; }
  #loading {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 20; gap: 16px;
  }
  .spinner {
    width: 40px; height: 40px; border: 3px solid #333;
    border-top-color: #e53e3e; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-size: 14px; color: #aaa; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p id="loading-text">正在启动摄像头...</p>
</div>

<div id="badge">✈ 检测到飞机！</div>

<div id="controls">
  <div class="ctrl-row">
    <span class="ctrl-label">模型</span>
    <div class="model-btns">
      <button class="model-btn active" id="btn-mobile" onclick="switchModel('mobilenet_v2')">轻量版<br><span style="font-size:10px;color:#888">快 · 约20MB</span></button>
      <button class="model-btn" id="btn-inception" onclick="switchModel('mobilenet_v1')">精准版<br><span style="font-size:10px;color:#888">慢 · 约30MB</span></button>
    </div>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">置信度</span>
    <input type="range" id="threshold" min="5" max="80" value="40" step="5"
           oninput="document.getElementById('thresh-val').textContent=this.value+'%'">
    <span class="ctrl-value" id="thresh-val">40%</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">数字变焦</span>
    <input type="range" id="zoom" min="1" max="4" value="1" step="0.5"
           oninput="document.getElementById('zoom-val').textContent=this.value+'x'">
    <span class="ctrl-value" id="zoom-val">1x</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">数字变焦</span>
    <input type="range" id="zoom" min="1" max="4" value="1" step="0.5"
           oninput="document.getElementById('zoom-val').textContent=this.value+'x'">
    <span class="ctrl-value" id="zoom-val">1x</span>
  </div>
</div>

<div id="status"></div>

<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
</div>
<div id="fps"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script>
const video      = document.getElementById('video');
const canvas     = document.getElementById('canvas');
const ctx        = canvas.getContext('2d');
const badge      = document.getElementById('badge');
const fpsEl      = document.getElementById('fps');
const loadingEl  = document.getElementById('loading');
const loadingTxt = document.getElementById('loading-text');
const statusEl   = document.getElementById('status');
const threshEl   = document.getElementById('threshold');

let model = null;
let currentBase = 'mobilenet_v2';
let isLoadingModel = false;
let animFrame = null;
let lastTime = 0, frameCount = 0, fps = 0;

function getThreshold() {
  return parseInt(threshEl.value) / 100;
}

async function switchModel(base) {
  if (isLoadingModel || base === currentBase) return;
  currentBase = base;

  document.getElementById('btn-mobile').classList.toggle('active', base === 'mobilenet_v2');
  document.getElementById('btn-inception').classList.toggle('active', base === 'mobilenet_v1');

  if (animFrame) cancelAnimationFrame(animFrame);
  model = null;
  loadingEl.style.display = 'flex';
  loadingTxt.textContent = base === 'mobilenet_v1'
    ? '加载精准版模型（约30MB，请耐心等待）...'
    : '加载轻量版模型...';

  await loadModel(base);
  loadingEl.style.display = 'none';
  detect();
}

async function loadModel(base) {
  isLoadingModel = true;
  try {
    model = await cocoSsd.load({ base });
  } catch(e) {
    statusEl.textContent = '模型加载失败：' + e.message;
  }
  isLoadingModel = false;
}

async function init() {
  // 启动摄像头
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    loadingTxt.textContent = '加载 AI 模型（约20MB）...';
  } catch(e) {
    loadingTxt.textContent = '无法访问摄像头：' + e.message;
    return;
  }

  await loadModel('mobilenet_v2');
  loadingEl.style.display = 'none';
  detect();
}

async function detect() {
  if (!model || video.readyState < 2) {
    animFrame = requestAnimationFrame(detect);
    return;
  }

  const threshold = getThreshold();
  let predictions = [];
  try {
    predictions = await model.detect(video);
  } catch(e) {
    animFrame = requestAnimationFrame(detect);
    return;
  }

  const zoom = parseFloat(document.getElementById('zoom').value);
  const cw = canvas.width, ch = canvas.height;
  const srcW = cw / zoom, srcH = ch / zoom;
  const srcX = (cw - srcW) / 2, srcY = (ch - srcH) / 2;

  ctx.clearRect(0, 0, cw, ch);
  ctx.drawImage(video, srcX, srcY, srcW, srcH, 0, 0, cw, ch);

  const airplanes = predictions.filter(p =>
    p.class === 'airplane' && p.score > threshold
  );

  airplanes.forEach(p => {
    let [x, y, w, h] = p.bbox;
    // 坐标映射到变焦后的画面
    x = (x - srcX) * zoom;
    y = (y - srcY) * zoom;
    w = w * zoom;
    h = h * zoom;
    // 红框
    ctx.strokeStyle = '#e53e3e';
    ctx.lineWidth = 3;
    ctx.strokeRect(x, y, w, h);
    // 标签
    const label = `飞机 ${Math.round(p.score * 100)}%`;
    ctx.font = 'bold 16px sans-serif';
    const tw = ctx.measureText(label).width;
    ctx.fillStyle = '#e53e3e';
    ctx.fillRect(x, y - 26, tw + 14, 26);
    ctx.fillStyle = '#fff';
    ctx.fillText(label, x + 7, y - 7);
  });

  badge.style.display = airplanes.length > 0 ? 'block' : 'none';

  // FPS
  frameCount++;
  const now = performance.now();
  if (now - lastTime >= 1000) {
    fps = frameCount; frameCount = 0; lastTime = now;
    fpsEl.textContent = fps + ' fps';
  }

  animFrame = requestAnimationFrame(detect);
}

init();
</script>
</body>
</html>
